  <meta name="description" content="WHY HARVEY

At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.

This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.

Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job&#39;s Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we&#39;re never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we&#39;d love to build with you.

At Harvey, the future of professional services is being written today — and we’re just getting started.


ROLE OVERVIEW

As a Software Engineer, Agents, you&#39;ll build the systems that make our AI agents indispensable to legal professionals.

You will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.

We&#39;re looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.


REPRESENTATIVE PROJECTS

 - Save weeks of effort on high pressure M&amp;A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.

 - Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal &quot;playbook&quot; to contracts.

 - Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.

 - Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.


WHAT YOU&#39;LL DO

 - Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.

 - Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.

 - Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.

 - Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.

 - Stay current on new developments in agentic systems and bring those learnings back to the products we build.


WHAT YOU HAVE

 - Passion for building effective domain-specific agents.

 - Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.

 - Comfortable with when and how to use evaluations to drive quality.

 - Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.

 - 2-5 years (post-BS/MS) of software engineering experience.

 - We are hiring for this role across Mid, Senior, and Staff levels.

 - Proficiency in Python and experience working with LLM APIs and agent frameworks.

 - Experience with shipping user-facing products, either on the backend or full-stack.


COMPENSATION RANGE

$161,300 - $241,900 USD

icationsBox":true,"logoWordmarkImageUrl":"https://app.ashbyhq.com/api/images/org-theme-wordmark/868dcb5b-0628-48f1-b4f7-fed828a37e35/8ee59e75-fb38-4eb7-80b7-3b902c5da994/38ba33d4-0012-4e37-9115-9d7e2d75f710.png","logoSquareImageUrl":"https://app.ashbyhq.com/api/images/org-theme-logo/868dcb5b-0628-48f1-b4f7-fed828a37e35/8ee59e75-fb38-4eb7-80b7-3b902c5da994/ba4329fb-4c07-4f68-9a2a-ea85386fb430.png","applicationSubmittedSuccessMessage":null,"jobBoardTopDescriptionHtml":null,"jobBoardBottomDescriptionHtml":null,"jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"recruitingPrivacyPolicyUrl":null,"timezone":"America/Los_Angeles","candidateScheduleCancellationReasonRequirementStatus":"Off","showCookieBanner":false},"posting":{"id":"2bd5b22c-d873-45da-a6d3-89944edb701c","title":"Software Engineer, Agents","updatedAt":"2026-05-01T18:37:44.241Z","departmentName":"Engineering","departmentExternalName":"Engineering","teamName":"Engineering","teamExternalName":"Engineering","teamNames":["Engineering"],"locationName":"New York","locationExternalName":"New York","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<h1><strong>Why Harvey</strong></h1><p style=\"min-height:1.5em\">At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.</p><p style=\"min-height:1.5em\">This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.</p><p style=\"min-height:1.5em\">Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we're never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we'd love to build with you.</p><p style=\"min-height:1.5em\">At Harvey, the future of professional services is being written today — and we’re just getting started.</p><p style=\"min-height:1.5em\"></p><h1><strong>Role Overview</strong></h1><p style=\"min-height:1.5em\">As a Software Engineer, Agents, you'll build the systems that make our AI agents indispensable to legal professionals.</p><p style=\"min-height:1.5em\">You will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.</p><p style=\"min-height:1.5em\">We're looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.</p><p style=\"min-height:1.5em\"></p><h1><strong>Representative Projects</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Save weeks of effort on high pressure M&amp;A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.</p></li><li><p style=\"min-height:1.5em\">Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal \"playbook\" to contracts.</p></li><li><p style=\"min-height:1.5em\">Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.</p></li><li><p style=\"min-height:1.5em\">Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You'll Do</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.</p></li><li><p style=\"min-height:1.5em\">Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.</p></li><li><p style=\"min-height:1.5em\">Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.</p></li><li><p style=\"min-height:1.5em\">Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.</p></li><li><p style=\"min-height:1.5em\">Stay current on new developments in agentic systems and bring those learnings back to the products we build.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You Have</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Passion for building effective domain-specific agents.</p></li><li><p style=\"min-height:1.5em\">Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.</p></li><li><p style=\"min-height:1.5em\">Comfortable with when and how to use evaluations to drive quality.</p></li><li><p style=\"min-height:1.5em\">Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.</p></li><li><p style=\"min-height:1.5em\">2-5 years (post-BS/MS) of software engineering experience. </p></li><li><p style=\"min-height:1.5em\">We are hiring for this role across Mid, Senior, and Staff levels.</p></li><li><p style=\"min-height:1.5em\">Proficiency in Python and experience working with LLM APIs and agent frameworks.</p></li><li><p style=\"min-height:1.5em\">Experience with shipping user-facing products, either on the backend or full-stack.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Compensation Range</strong></h1><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">$161,300 - $241,900 USD</p><p style=\"min-height:1.5em\"></p><h3><strong>Depending on your location, an Applicant Privacy Notice may apply to you. You can find all of our Applicant Privacy Notices [</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922\"><strong>here</strong></a><strong>].</strong></h3><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">#LI-BB1</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>Harvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law.</em></p><p style=\"min-height:1.5em\">We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"mailto:accommodations@harvey.ai\">accommodations@harvey.ai</a></p>","descriptionPlainText":"WHY HARVEY\n\nAt Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.\n\nThis is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.\n\nOur team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we're never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we'd love to build with you.\n\nAt Harvey, the future of professional services is being written today — and we’re just getting started.\n\n\nROLE OVERVIEW\n\nAs a Software Engineer, Agents, you'll build the systems that make our AI agents indispensable to legal professionals.\n\nYou will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.\n\nWe're looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.\n\n\nREPRESENTATIVE PROJECTS\n\n - Save weeks of effort on high pressure M&A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.\n\n - Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal \"playbook\" to contracts.\n\n - Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.\n\n - Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.\n\n\nWHAT YOU'LL DO\n\n - Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.\n\n - Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.\n\n - Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.\n\n - Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.\n\n - Stay current on new developments in agentic systems and bring those learnings back to the products we build.\n\n\nWHAT YOU HAVE\n\n - Passion for building effective domain-specific agents.\n\n - Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.\n\n - Comfortable with when and how to use evaluations to drive quality.\n\n - Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.\n\n - 2-5 years (post-BS/MS) of software engineering experience.\n\n - We are hiring for this role across Mid, Senior, and Staff levels.\n\n - Proficiency in Python and experience working with LLM APIs and agent frameworks.\n\n - Experience with shipping user-facing products, either on the backend or full-stack.\n\n\nCOMPENSATION RANGE\n\n$161,300 - $241,900 USD\n\n\nDEPENDING ON YOUR LOCATION, AN APPLICANT PRIVACY NOTICE MAY APPLY TO YOU. YOU CAN FIND ALL OF OUR APPLICANT PRIVACY NOTICES [HERE https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922].\n\n#LI-BB1\n\nHarvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law.\n\nWe are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing accommodations@harvey.ai","descriptionParts":{"descriptionOpening":{"html":"<h1><strong>Why Harvey</strong></h1><p style=\"min-height:1.5em\">At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.</p><p style=\"min-height:1.5em\">This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.</p><p style=\"min-height:1.5em\">Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we're never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we'd love to build with you.</p><p style=\"min-height:1.5em\">At Harvey, the future of professional services is being written today — and we’re just getting started.</p>","plain":"WHY HARVEY\n\nAt Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.\n\nThis is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.\n\nOur team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we're never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we'd love to build with you.\n\nAt Harvey, the future of professional services is being written today — and we’re just getting started."},"descriptionBody":{"html":"<p style=\"min-height:1.5em\"></p><h1><strong>Role Overview</strong></h1><p style=\"min-height:1.5em\">As a Software Engineer, Agents, you'll build the systems that make our AI agents indispensable to legal professionals.</p><p style=\"min-height:1.5em\">You will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.</p><p style=\"min-height:1.5em\">We're looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.</p><p style=\"min-height:1.5em\"></p><h1><strong>Representative Projects</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Save weeks of effort on high pressure M&amp;A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.</p></li><li><p style=\"min-height:1.5em\">Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal \"playbook\" to contracts.</p></li><li><p style=\"min-height:1.5em\">Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.</p></li><li><p style=\"min-height:1.5em\">Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You'll Do</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.</p></li><li><p style=\"min-height:1.5em\">Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.</p></li><li><p style=\"min-height:1.5em\">Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.</p></li><li><p style=\"min-height:1.5em\">Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.</p></li><li><p style=\"min-height:1.5em\">Stay current on new developments in agentic systems and bring those learnings back to the products we build.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You Have</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Passion for building effective domain-specific agents.</p></li><li><p style=\"min-height:1.5em\">Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.</p></li><li><p style=\"min-height:1.5em\">Comfortable with when and how to use evaluations to drive quality.</p></li><li><p style=\"min-height:1.5em\">Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.</p></li><li><p style=\"min-height:1.5em\">2-5 years (post-BS/MS) of software engineering experience. </p></li><li><p style=\"min-height:1.5em\">We are hiring for this role across Mid, Senior, and Staff levels.</p></li><li><p style=\"min-height:1.5em\">Proficiency in Python and experience working with LLM APIs and agent frameworks.</p></li><li><p style=\"min-height:1.5em\">Experience with shipping user-facing products, either on the backend or full-stack.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Compensation Range</strong></h1><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">$161,300 - $241,900 USD</p><p style=\"min-height:1.5em\"></p><h3><strong>Depending on your location, an Applicant Privacy Notice may apply to you. You can find all of our Applicant Privacy Notices [</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922\"><strong>here</strong></a><strong>].</strong></h3><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">#LI-BB1</p><p style=\"min-height:1.5em\"></p>","plain":"ROLE OVERVIEW\n\nAs a Software Engineer, Agents, you'll build the systems that make our AI agents indispensable to legal professionals.\n\nYou will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.\n\nWe're looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.\n\n\nREPRESENTATIVE PROJECTS\n\n - Save weeks of effort on high pressure M&A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.\n\n - Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal \"playbook\" to contracts.\n\n - Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.\n\n - Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.\n\n\nWHAT YOU'LL DO\n\n - Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.\n\n - Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.\n\n - Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.\n\n - Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.\n\n - Stay current on new developments in agentic systems and bring those learnings back to the products we build.\n\n\nWHAT YOU HAVE\n\n - Passion for building effective domain-specific agents.\n\n - Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.\n\n - Comfortable with when and how to use evaluations to drive quality.\n\n - Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.\n\n - 2-5 years (post-BS/MS) of software engineering experience.\n\n - We are hiring for this role across Mid, Senior, and Staff levels.\n\n - Proficiency in Python and experience working with LLM APIs and agent frameworks.\n\n - Experience with shipping user-facing products, either on the backend or full-stack.\n\n\nCOMPENSATION RANGE\n\n$161,300 - $241,900 USD\n\n\nDEPENDING ON YOUR LOCATION, AN APPLICANT PRIVACY NOTICE MAY APPLY TO YOU. YOU CAN FIND ALL OF OUR APPLICANT PRIVACY NOTICES [HERE https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922].\n\n#LI-BB1"},"descriptionClosing":{"html":"<p style=\"min-height:1.5em\"><em>Harvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law.</em></p><p style=\"min-height:1.5em\">We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"mailto:accommodations@harvey.ai\">accommodations@harvey.ai</a></p>","plain":"Harvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law.\n\nWe are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing accommodations@harvey.ai"}},"shortDescription":null,"applicationFormDefinitionId":"4f33954f-d23f-4021-902a-e21e0259e8cf","surveyFormDefinitionIds":[],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Software Engineer, Agents","description":"<h1><strong>Why Harvey</strong></h1><p style=\"min-height:1.5em\">At Harvey, we’re transforming how legal and professional services operate. By combining frontier agentic AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how critical knowledge work gets done for decades to come.</p><p style=\"min-height:1.5em\">This is a rare chance to help build a generational company at a true inflection point. With 1500+ customers in 60+ countries, strong product-market fit, and world-class investor support, we’re scaling fast and defining a new category in real time. The work is ambitious, the bar is high, and the opportunity for growth — personal, professional, and financial — is unmatched.</p><p style=\"min-height:1.5em\">Our team moves fast, takes ownership, and is deeply committed to the mission — operating with intensity, staying close to our customers, and pushing each other for excellence. We live by three values: Decisiveness, Simplicity, and Job's Not Finished. We act quickly on clear judgment over perfect information, we believe simplicity is what scales, and we're never satisfied with where we are. If you want to do the best work of your career alongside people who share that drive, we'd love to build with you.</p><p style=\"min-height:1.5em\">At Harvey, the future of professional services is being written today — and we’re just getting started.</p><p style=\"min-height:1.5em\"></p><h1><strong>Role Overview</strong></h1><p style=\"min-height:1.5em\">As a Software Engineer, Agents, you'll build the systems that make our AI agents indispensable to legal professionals.</p><p style=\"min-height:1.5em\">You will design environments and actions for agentic professional work, make model selection decisions, manage context windows, create optimal tools, and develop evals that enable faster iteration loops to unlock new capabilities.</p><p style=\"min-height:1.5em\">We're looking for engineers and researchers who are immersed in the space, driven to ship impactful products, and are experienced in using practical evaluations to drive task completion quality and customer delight.</p><p style=\"min-height:1.5em\"></p><h1><strong>Representative Projects</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Save weeks of effort on high pressure M&amp;A deals by automating information requests and diligence checks across hundreds of thousands of files with retrieval and file editing agents.</p></li><li><p style=\"min-height:1.5em\">Dramatically speed up deal turnaround speed by improving the latency and quality of agents on applying a standard legal \"playbook\" to contracts.</p></li><li><p style=\"min-height:1.5em\">Ensure that our clients win their complex, data-hungry litigation cases by optimizing our multi-source retrieval agents.</p></li><li><p style=\"min-height:1.5em\">Enable board-ready PowerPoint generation by tuning the harness and libraries for coding agents.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You'll Do</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Partner with customers and PMs to understand legal workflows, design practical evaluations that capture what “excellent” means, and ship agents that get the job done.</p></li><li><p style=\"min-height:1.5em\">Optimize agent performance through prompt engineering, model selection, tool design, skill writing, context window management, and eval harness development.</p></li><li><p style=\"min-height:1.5em\">Work with our model infra team to design and implement infrastructure for low-latency agent execution, including caching strategies, parallel tool calls, or subagent patterns.</p></li><li><p style=\"min-height:1.5em\">Improve our observability and instrumentation to profile agent behavior, identify bottlenecks, and drive optimization decisions.</p></li><li><p style=\"min-height:1.5em\">Stay current on new developments in agentic systems and bring those learnings back to the products we build.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>What You Have</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Passion for building effective domain-specific agents.</p></li><li><p style=\"min-height:1.5em\">Iterative mindset: you develop proof of concepts, make decisions quickly, and ship v0s.</p></li><li><p style=\"min-height:1.5em\">Comfortable with when and how to use evaluations to drive quality.</p></li><li><p style=\"min-height:1.5em\">Humble and adaptable about code and frameworks. We expect you to drive adoption of new best practices as they develop.</p></li><li><p style=\"min-height:1.5em\">2-5 years (post-BS/MS) of software engineering experience. </p></li><li><p style=\"min-height:1.5em\">We are hiring for this role across Mid, Senior, and Staff levels.</p></li><li><p style=\"min-height:1.5em\">Proficiency in Python and experience working with LLM APIs and agent frameworks.</p></li><li><p style=\"min-height:1.5em\">Experience with shipping user-facing products, either on the backend or full-stack.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Compensation Range</strong></h1><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">$161,300 - $241,900 USD</p><p style=\"min-height:1.5em\"></p><h3><strong>Depending on your location, an Applicant Privacy Notice may apply to you. You can find all of our Applicant Privacy Notices [</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.notion.so/harveyai/Harvey-Candidate-Privacy-Policies-319ac3fcdd7a803bb807d5094f249922\"><strong>here</strong></a><strong>].</strong></h3><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\">#LI-BB1</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><em>Harvey is an equal opportunity employer and does not discriminate on the basis of race, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or related condition, or any other basis protected by law.</em></p><p style=\"min-height:1.5em\">We are committed to providing reasonable accommodations to applicants with disabilities, and requests can be made by emailing <a target=\
